  <!DOCTYPE html>
  <html lang="en">                                                                                                                                                                   
  <head>      
    <meta charset="UTF-8">                                                                                                                                                           
    <title>EUD-5237 — GTM-style injection fallback</title>
                                                                                                                                                                                     
    <meta http-equiv="Content-Security-Policy"
          content="                                                                                                                                                                  
            default-src 'self';
            script-src 'nonce-abc123xyz' 'strict-dynamic' https:;
            style-src 'self' 'nonce-abc123xyz';                                                                                                                                      
            img-src 'self' data: https:;
            font-src 'self' data: https:;                                                                                                                                            
            connect-src 'self' https:;
            frame-src 'self' https:;                                                                                                                                                 
          ">
                                                                                                                                                                                     
    <!-- Simulating GTM: the injecting script has a nonce, the loader itself does not.                                                                                               
         The SDK must pick up the nonce through document.currentScript.nonce.
         'strict-dynamic' lets it through because the injecting script is already trusted. -->                                                                                       
    <script nonce="abc123xyz">                                                                                                                                                       
      const s = document.createElement('script');                                                                                                                                    
      s.id = 'usercentrics-cmp';                                                                                                                                                     
      s.src = 'https://web.cmp.usercentrics-sandbox.eu/ui/pr/1467/loader.js';
      s.setAttribute('data-settings-id', 'jtKp0I8ci');                                                                                                                        
      // Intentionally NOT setting a nonce on the loader itself.                                                                                                                     
      document.head.appendChild(s);                                                                                                                                                  
    </script>                                                                                                                                                                        
  </head>                                                                                                                                                                            
  <body>      
    <h1>GTM-style injection fallback</h1>
    <p>The banner must load, styles inside the shadow DOM must carry the nonce, and no CSP errors should appear.</p>
    <script nonce="abc123xyz">                                                                                                                                                       
      window.checkCmpNonces = () => {
        const cmp = document.getElementById('usercentrics-cmp-ui');                                                                                                                  
        const styles = cmp?.shadowRoot?.querySelectorAll('style') ?? [];                                                                                                             
        console.table([...styles].map((s, i) => ({ index: i, nonce: s.nonce })));
      };                                                                                                                                                                             
    </script> 
  </body>                                                                                                                                                                            
  </html>
